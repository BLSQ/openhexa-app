# Defines a service that can be reused multiple times later
x-app: &common
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: app
      additional_contexts:
        docs: ./docs
      args:
        - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE}
        - WORKSPACE_STORAGE_LOCATION=${WORKSPACE_STORAGE_LOCATION}
    env_file:
      - path: ./.env
        required: true
    environment:
      - ADDITIONAL_ALLOWED_HOSTS=*
      - SESSION_COOKIE_SECURE=False
      - CSRF_COOKIE_SECURE=False
      - SECURE_SSL_REDIRECT=False
      - PIPELINE_SCHEDULER_SPAWNER=docker
      - WEBAPPS_DOMAIN=${WEBAPPS_DOMAIN:-webapps.localhost:8000}

    networks:
      - openhexa
    volumes:  # only used for Github Codespaces
      - "${LOCAL_WORKSPACE_FOLDER:-./backend}:/code"
      - "./docs:/code/docs:ro"
      - "${WORKSPACE_STORAGE_LOCATION:-/data/openhexa}:/data"

services:
  db:
    platform: linux/amd64
    image: postgis/postgis:16-3.5
    # Trade crash-durability for speed: fine for a dev/CI database, do not
    # reuse for production deployments.
    command: postgres -c fsync=off -c synchronous_commit=off -c full_page_writes=off
    env_file:
      - path: ./.env
        required: true
    networks:
      - openhexa
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  app:
    # Inherit from the block defined on top and override some fields
    <<: *common
    command: "start"
    restart: unless-stopped
    image: blsq/openhexa-app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - forgejo

  # Workers
  ##########

  dataset_worker:
    <<: *common
    command: "manage dataset_worker"
    restart: unless-stopped
    profiles:
      - "dataset_worker"
    depends_on:
      - db

  pipelines_runner:
    <<: *common
    user: "root"
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: pipelines
      additional_contexts:
        docs: ./docs
      args:
        - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE}
        - WORKSPACE_STORAGE_LOCATION=${WORKSPACE_STORAGE_LOCATION}
    command: "manage pipelines_runner"
    restart: unless-stopped
    profiles:
      - "pipelines"
    depends_on:
      - db
    environment:
      - IS_LOCAL_DEV=true
    volumes:  # only used for Github Codespaces
      - "${LOCAL_WORKSPACE_FOLDER:-./backend}:/code"
      - "./docs:/code/docs:ro"
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.kube:/root/.kube:ro

  pipelines_scheduler:
    <<: *common
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: pipelines
      additional_contexts:
        docs: ./docs
      args:
        - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE}
        - WORKSPACE_STORAGE_LOCATION=${WORKSPACE_STORAGE_LOCATION}
    command: "manage pipelines_scheduler"
    restart: unless-stopped
    profiles:
      - "pipelines"
    volumes:  # only used for Github Codespaces
      - "${LOCAL_WORKSPACE_FOLDER:-./backend}:/code"
      - "./docs:/code/docs:ro"
    depends_on:
      - db

  # Frontend
  # TODO: Fix dev container to be able to work with the backend graphql files
  ###########

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    env_file: ./.env
    networks:
      - openhexa
    profiles:
      - "frontend"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - OPENHEXA_BACKEND_URL=http://app:8000
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./.env:/.env
      - ./backend:/backend

  # Dev tools
  ############

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - openhexa

  # Azurite is used to test the Azure storage backend locally. This has to be run separately when triggering tests.
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: azurite
    hostname: azurite
    restart: always
    command: azurite --skipApiVersionCheck --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    profiles:
      - "test"
    networks:
      - openhexa
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"


  # Git server
  #############

  forgejo:
    image: codeberg.org/forgejo/forgejo:14
    entrypoint: /custom-entrypoint.sh
    environment:
      - GIT_SERVER_ADMIN_USERNAME=${GIT_SERVER_ADMIN_USERNAME}
      - GIT_SERVER_ADMIN_PASSWORD=${GIT_SERVER_ADMIN_PASSWORD}
      - GIT_PROXY_USERNAME=${GIT_PROXY_USERNAME:-openhexa-proxy}
      - GIT_PROXY_PASSWORD=${GIT_PROXY_PASSWORD}
      - FORGEJO__database__DB_TYPE=sqlite3
      - FORGEJO__security__INSTALL_LOCK=true
      - FORGEJO__server__ROOT_URL=http://localhost:3100/
      - FORGEJO__server__LANDING_PAGE=explore
      - FORGEJO__service__DISABLE_REGISTRATION=true
      - FORGEJO__service__REQUIRE_SIGNIN_VIEW=true
    volumes:
      - forgejo_data:/data
      - ./forgejo/entrypoint.sh:/custom-entrypoint.sh:ro
    ports:
      - "3100:3000"
    networks:
      - openhexa

  # Local equivalent of the production git proxy
  git_proxy:
    image: nginx:alpine
    profiles:
      - git_proxy
    depends_on:
      - app
      - forgejo
    environment:
      - APP_UPSTREAM=app:8000
      - FORGEJO_UPSTREAM=forgejo:3000
      - GIT_PROXY_USERNAME=${GIT_PROXY_USERNAME:-openhexa-proxy}
      - GIT_PROXY_PASSWORD=${GIT_PROXY_PASSWORD}
    volumes:
      - ./docker/git-proxy/git-proxy.conf.template:/etc/nginx/templates/git-proxy.conf.template:ro
      - ./docker/git-proxy/entrypoint.sh:/git-proxy-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/git-proxy-entrypoint.sh"]
    ports:
      - "3200:3000"
    networks:
      - openhexa

  # Legacy services
  ################

  # This service is only used for the connector_accessmod app.
  accessmod_dataworker:
    <<: *common
    command: "manage validate_fileset_worker"
    restart: unless-stopped
    profiles:
      - "accessmod"
    depends_on:
      - db

networks:
  openhexa:
    name: openhexa
    external: true

volumes:
  pgdata:
  minio_data:
  forgejo_data:
