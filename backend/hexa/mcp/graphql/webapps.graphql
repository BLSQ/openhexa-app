query ListStaticWebapps($workspaceSlug: String, $page: Int, $perPage: Int) {
  webapps(workspaceSlug: $workspaceSlug, page: $page, perPage: $perPage) {
    pageNumber
    totalPages
    totalItems
    items {
      id
      slug
      name
      description
      url
      type
      isPublic
      permissions {
        update
      }
    }
  }
}

query GetStaticWebapp($workspaceSlug: String!, $slug: String!) {
  webapp(workspaceSlug: $workspaceSlug, slug: $slug) {
    id
    slug
    name
    description
    url
    type
    isPublic
    allowedOperations
    workspace {
      slug
    }
    files {
      path
      type
      content
      encoding
      language
      lineCount
    }
    permissions {
      update
      delete
    }
  }
}

mutation CreateStaticWebapp($input: CreateWebappInput!) {
  createWebapp(input: $input) {
    success
    errors
    webapp {
      id
      slug
      name
      description
      url
      type
      allowedOperations
    }
  }
}

mutation UpdateStaticWebapp($input: UpdateWebappInput!) {
  updateWebapp(input: $input) {
    success
    errors
    webapp {
      id
      slug
      name
      description
      url
      type
      allowedOperations
    }
  }
}