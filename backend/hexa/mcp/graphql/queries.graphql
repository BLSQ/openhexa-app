query ListWorkspaces($query: String, $page: Int, $perPage: Int) {
  workspaces(query: $query, page: $page, perPage: $perPage) {
    pageNumber
    totalPages
    totalItems
    items {
      slug
      name
      createdAt
      updatedAt
      permissions {
        createObject
        update
      }
    }
  }
}

query GetWorkspace($slug: String!) {
  workspace(slug: $slug) {
    slug
    name
    description
    createdAt
    updatedAt
    permissions {
      createObject
      update
    }
  }
}

query ListPipelines($workspaceSlug: String, $page: Int, $perPage: Int) {
  pipelines(workspaceSlug: $workspaceSlug, page: $page, perPage: $perPage) {
    pageNumber
    totalPages
    totalItems
    items {
      id
      code
      name
      description
      createdAt
      updatedAt
      workspace {
        slug
      }
    }
  }
}

query GetPipeline($workspaceSlug: String!, $code: String!, $runsPage: Int, $runsPerPage: Int) {
  pipelineByCode(workspaceSlug: $workspaceSlug, code: $code) {
    id
    code
    name
    description
    schedule
    type
    functionalType
    createdAt
    updatedAt
    webhookEnabled
    workspace {
      slug
      name
    }
    currentVersion {
      id
      versionNumber
      versionName
      description
      createdAt
      parameters {
        code
        name
        type
        required
        multiple
        default
        help
        choices
      }
      files {
        name
        path
        type
        content
        language
        lineCount
      }
    }
    runs(page: $runsPage, perPage: $runsPerPage, orderBy: EXECUTION_DATE_DESC) {
      pageNumber
      totalPages
      totalItems
      items {
        id
        status
        executionDate
        duration
      }
    }
    permissions {
      run
      update
      delete
      schedule
      stopPipeline
    }
  }
}

query GetPipelineRun($id: UUID!) {
  pipelineRun(id: $id) {
    id
    status
    executionDate
    duration
    progress
    triggerMode
    config
    hasErrorMessages
    sendMailNotifications
    enableDebugLogs
    user {
      displayName
      email
    }
    pipeline {
      code
      name
      workspace {
        slug
      }
    }
    version {
      versionName
    }
    messages {
      priority
      message
      timestamp
    }
    outputs {
      ... on BucketObject {
        bucketObjectName: name
        key
        path
        bucketObjectType: type
        size
        updatedAt
      }
      ... on GenericOutput {
        genericOutputName: name
        genericOutputType: type
        uri
      }
      ... on DatabaseTable {
        databaseTableName: name
      }
    }
    logs
  }
}

mutation RunPipeline($input: RunPipelineInput!) {
  runPipeline(input: $input) {
    success
    errors
    run {
      id
      status
      executionDate
    }
  }
}

mutation UpdatePipeline($input: UpdatePipelineInput!) {
  updatePipeline(input: $input) {
    success
    errors
    pipeline {
      id
      code
      name
      schedule
      description
      functionalType
    }
  }
}

query ListPipelineTemplates($page: Int, $perPage: Int, $search: String) {
  pipelineTemplates(page: $page, perPage: $perPage, search: $search) {
    pageNumber
    totalPages
    totalItems
    items {
      id
      name
      code
      description
      functionalType
      pipelinesCount
      validatedAt
      tags {
        name
      }
      currentVersion {
        id
        versionNumber
        createdAt
      }
    }
  }
}

query GetPipelineTemplate($code: String!) {
  templateByCode(code: $code) {
    id
    name
    code
    description
    config
    functionalType
    updatedAt
    tags {
      name
    }
    currentVersion {
      id
      versionNumber
      changelog
      createdAt
      sourcePipelineVersion {
        parameters {
          code
          name
          type
          required
          default
          help
        }
        files {
          name
          path
          type
          content
          language
          lineCount
        }
      }
    }
    versions(page: 1, perPage: 10) {
      totalItems
      items {
        id
        versionNumber
        changelog
        createdAt
      }
    }
  }
}

mutation CreatePipelineFromTemplate($input: CreatePipelineFromTemplateVersionInput!) {
  createPipelineFromTemplateVersion(input: $input) {
    success
    errors
    pipeline {
      id
      code
      name
      description
      workspace {
        slug
      }
      currentVersion {
        id
        versionName
      }
      sourceTemplate {
        name
        code
      }
    }
  }
}

query ListDatasets($workspaceSlug: String!, $query: String, $page: Int, $perPage: Int) {
  workspace(slug: $workspaceSlug) {
    datasets(query: $query, page: $page, perPage: $perPage) {
      pageNumber
      totalPages
      totalItems
      items {
        dataset {
          id
          slug
          name
          description
          createdAt
          updatedAt
          workspace {
            slug
          }
        }
      }
    }
  }
}

query GetDataset($workspaceSlug: String!, $datasetSlug: String!, $versionsPage: Int, $versionsPerPage: Int) {
  datasetLinkBySlug(workspaceSlug: $workspaceSlug, datasetSlug: $datasetSlug) {
    dataset {
      id
      slug
      name
      description
      createdAt
      updatedAt
      workspace {
        slug
      }
      permissions {
        update
        createVersion
      }
      latestVersion {
        id
        name
        changelog
        createdAt
        files(page: 1, perPage: 50) {
          totalItems
          items {
            id
            filename
            contentType
            size
            rows
            createdAt
          }
        }
      }
      versions(page: $versionsPage, perPage: $versionsPerPage) {
        pageNumber
        totalPages
        totalItems
        items {
          id
          name
          changelog
          createdAt
        }
      }
    }
  }
}

query PreviewDatasetFile($id: ID!) {
  datasetVersionFile(id: $id) {
    id
    filename
    contentType
    size
    rows
    properties
    fileSample {
      sample
      status
      statusReason
    }
  }
}

mutation CreateDataset($input: CreateDatasetInput!) {
  createDataset(input: $input) {
    success
    errors
    dataset {
      id
      slug
      name
      description
      workspace {
        slug
      }
    }
  }
}

mutation CreateDatasetVersion($input: CreateDatasetVersionInput!) {
  createDatasetVersion(input: $input) {
    success
    errors
    version {
      id
      name
      changelog
      createdAt
    }
  }
}

query ListFiles($workspaceSlug: String!, $prefix: String, $page: Int, $perPage: Int) {
  workspace(slug: $workspaceSlug) {
    bucket {
      objects(prefix: $prefix, page: $page, perPage: $perPage, ignoreHiddenFiles: false) {
        hasNextPage
        hasPreviousPage
        pageNumber
        items {
          name
          key
          path
          type
          size
          updatedAt
        }
      }
    }
  }
}

query ReadFileContent($workspaceSlug: String!, $filePath: String!) {
  readFileContent(workspaceSlug: $workspaceSlug, filePath: $filePath) {
    success
    errors
    content
    size
  }
}

mutation WriteFileContent($input: WriteFileContentInput!) {
  writeFileContent(input: $input) {
    success
    errors
    filePath
    size
  }
}

query ListConnections($slug: String!) {
  workspace(slug: $slug) {
    connections {
      id
      name
      slug
      description
      type
      createdAt
      updatedAt
      fields {
        code
        value
        secret
      }
    }
  }
}

query ListStaticWebapps($workspaceSlug: String, $page: Int, $perPage: Int) {
  webapps(workspaceSlug: $workspaceSlug, page: $page, perPage: $perPage) {
    pageNumber
    totalPages
    totalItems
    items {
      id
      slug
      name
      description
      url
      type
      isPublic
      permissions {
        update
      }
    }
  }
}

mutation CreateStaticWebapp($input: CreateWebappInput!) {
  createWebapp(input: $input) {
    success
    errors
    webapp {
      id
      slug
      name
      description
      url
      type
    }
  }
}

mutation UpdateStaticWebapp($input: UpdateWebappInput!) {
  updateWebapp(input: $input) {
    success
    errors
    webapp {
      id
      slug
      name
      description
      url
      type
    }
  }
}