type AssistantMessagePage {
  items: [AssistantMessage!]!
  totalItems: Int!
  totalPages: Int!
}

type AssistantConversation {
  id: UUID!
  name: String
  createdAt: DateTime!
  updatedAt: DateTime!
  totalInputTokens: Int!
  totalOutputTokens: Int!
  messages(page: Int = 1, perPage: Int = 20): AssistantMessagePage!
}

type AssistantTextSegment {
  content: String!
}

type AssistantToolSegment {
  id: UUID
  toolCallId: String!
  toolName: String!
  toolInput: JSON!
  toolOutput: JSON
  success: Boolean!
  proposalPending: Boolean!
}

union AssistantMessageSegment = AssistantTextSegment | AssistantToolSegment

type AssistantMessage {
  id: UUID!
  createdAt: DateTime!
  role: String!
  content: [AssistantMessageSegment!]!
  inputTokens: Int
  outputTokens: Int
}

extend type Workspace {
  assistantConversations: [AssistantConversation!]!
}

extend type Pipeline {
  assistantConversations: [AssistantConversation!]!
}

enum LinkedObjectType {
  Pipeline
}

# The set of tool names any agent can call, and thus any name that can appear in
# `AssistantToolSegment.toolName`. Declared here so GraphQL codegen emits a typed
# enum the assistant frontend keys off for rendering. Keep in sync with the agent
# registry (`hexa.assistant.agents.all_agent_tool_names`) — a unit test enforces this.
enum AssistantToolName {
  create_pipeline
  get_dataset
  get_help_or_doc
  list_connections
  list_datasets
  list_files
  preview_dataset_file
  propose_pipeline_version
  read_file
}

input CreateAssistantConversationInput {
  workspaceSlug: String!
  instructionSet: String
  linkedObjectId: UUID
  linkedObjectType: LinkedObjectType
}

enum CreateAssistantConversationError {
  WORKSPACE_NOT_FOUND
  LINKED_OBJECT_NOT_FOUND
  INVALID_LINKED_OBJECT_TYPE
  INVALID_INSTRUCTION_SET
  PERMISSION_DENIED
}

type CreateAssistantConversationResult {
  success: Boolean!
  errors: [CreateAssistantConversationError!]!
  conversation: AssistantConversation
}

enum ResolveAssistantProposalError {
  NOT_FOUND
  PERMISSION_DENIED
}

type ResolveAssistantProposalResult {
  success: Boolean!
  errors: [ResolveAssistantProposalError!]!
  toolInvocation: AssistantToolSegment
}

extend type Mutation {
  createAssistantConversation(input: CreateAssistantConversationInput!): CreateAssistantConversationResult!
  resolveAssistantProposal(toolInvocationId: UUID!): ResolveAssistantProposalResult!
}

extend type Query {
  assistantConversation(id: UUID!): AssistantConversation
}

extend type Me {
  assistantMonthlyLimitExceeded: Boolean!
  assistantMonthlyCost: Int! # in microdollars (millionths of a dollar)
  assistantTotalCost: Int! # in microdollars (millionths of a dollar)
}
