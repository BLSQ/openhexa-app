<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GraphQL Proxy Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f9fafb; color: #111827; padding: 2rem; max-width: 800px; margin: 0 auto; }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem; }
    h2 { font-size: 0.875rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 0.5rem; padding: 1rem; margin-bottom: 1rem; }
    .query-btn { display: inline-block; padding: 0.375rem 0.75rem; font-size: 0.8125rem; font-weight: 500; color: #fff; background: #2563eb; border: none; border-radius: 0.375rem; cursor: pointer; margin: 0.25rem 0.25rem 0.25rem 0; }
    .query-btn:hover { background: #1d4ed8; }
    .query-btn:disabled { background: #93c5fd; cursor: wait; }
    .query-btn.danger { background: #dc2626; }
    .query-btn.danger:hover { background: #b91c1c; }
    textarea { width: 100%; min-height: 5rem; font-family: ui-monospace, monospace; font-size: 0.8125rem; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 0.375rem; resize: vertical; }
    .result { margin-top: 0.75rem; }
    .result pre { background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 0.375rem; padding: 0.75rem; font-size: 0.75rem; overflow-x: auto; white-space: pre-wrap; word-break: break-word; max-height: 20rem; overflow-y: auto; }
    .result .status { font-size: 0.75rem; font-weight: 500; margin-bottom: 0.25rem; }
    .result .status.ok { color: #059669; }
    .result .status.err { color: #dc2626; }
    .section { margin-bottom: 2rem; }
    .info { font-size: 0.8125rem; color: #6b7280; margin-bottom: 1rem; line-height: 1.5; }
    .endpoint { font-family: ui-monospace, monospace; font-size: 0.8125rem; background: #f3f4f6; padding: 0.25rem 0.5rem; border-radius: 0.25rem; }
  </style>
</head>
<body>
  <h1>GraphQL Proxy Test</h1>
  <p class="info">
    Endpoint: <span class="endpoint" id="endpoint"></span><br>
    This page must be served from a webapp subdomain to work.
  </p>

  <div class="section">
    <h2>user.read</h2>
    <div class="card">
      <button class="query-btn" onclick="runQuery('me', '{ me { user { id email displayName } } }')">me</button>
      <button class="query-btn" onclick="runQuery('workspace', workspaceQuery)">workspace</button>
      <div class="result" id="result-me"></div>
      <div class="result" id="result-workspace"></div>
    </div>
  </div>

  <div class="section">
    <h2>pipelines.read</h2>
    <div class="card">
      <button class="query-btn" onclick="runQuery('pipelines', '{ pipelines(page: 1, perPage: 5) { items { id name code } } }')">pipelines</button>
      <button class="query-btn" onclick="runPipelineById()">pipeline (by first result)</button>
      <div class="result" id="result-pipelines"></div>
      <div class="result" id="result-pipeline"></div>
    </div>
  </div>

  <div class="section">
    <h2>pipelines.run</h2>
    <div class="card">
      <p class="info">Enter a pipeline ID and version ID to test runPipeline.</p>
      <div style="display:flex;gap:0.5rem;margin-bottom:0.5rem">
        <input id="run-pipeline-id" placeholder="Pipeline ID" style="flex:1;padding:0.375rem;font-size:0.8125rem;border:1px solid #d1d5db;border-radius:0.375rem">
        <input id="run-version-id" placeholder="Version ID" style="flex:1;padding:0.375rem;font-size:0.8125rem;border:1px solid #d1d5db;border-radius:0.375rem">
      </div>
      <button class="query-btn danger" onclick="runPipeline()">runPipeline</button>
      <div class="result" id="result-runPipeline"></div>
    </div>
  </div>

  <div class="section">
    <h2>files.read</h2>
    <div class="card">
      <div style="display:flex;gap:0.5rem;margin-bottom:0.5rem">
        <input id="workspace-slug" placeholder="Workspace slug" style="flex:1;padding:0.375rem;font-size:0.8125rem;border:1px solid #d1d5db;border-radius:0.375rem">
      </div>
      <button class="query-btn" onclick="listFiles()">getFileByPath (root)</button>
      <div class="result" id="result-files"></div>
    </div>
  </div>

  <div class="section">
    <h2>Custom Query</h2>
    <div class="card">
      <textarea id="custom-query" placeholder='{ me { user { email } } }'></textarea>
      <button class="query-btn" onclick="runCustom()" style="margin-top:0.5rem">Run</button>
      <div class="result" id="result-custom"></div>
    </div>
  </div>

  <div class="section">
    <h2>Denied (should return 403)</h2>
    <div class="card">
      <button class="query-btn danger" onclick="runQuery('denied', '{ datasets(workspaceSlug: &quot;test&quot;, page: 1, perPage: 1) { items { id } } }')">datasets (not in scopes)</button>
      <div class="result" id="result-denied"></div>
    </div>
  </div>

  <script>
    const ENDPOINT = "/graphql/";
    document.getElementById("endpoint").textContent = location.origin + ENDPOINT;

    const workspaceQuery = `{
  me { user { email } }
}`;

    let lastPipelines = [];

    async function gql(query) {
      const res = await fetch(ENDPOINT, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query }),
      });
      const body = await res.json();
      return { status: res.status, body };
    }

    function showResult(id, { status, body }) {
      const el = document.getElementById("result-" + id);
      const ok = status >= 200 && status < 300 && !body.errors;
      el.innerHTML = `
        <div class="status ${ok ? "ok" : "err"}">${status} ${ok ? "OK" : "ERROR"}</div>
        <pre>${JSON.stringify(body, null, 2)}</pre>
      `;
    }

    async function runQuery(id, query) {
      const btn = event.target;
      btn.disabled = true;
      try {
        const result = await gql(query);
        showResult(id, result);
        if (id === "pipelines" && result.body.data?.pipelines?.items) {
          lastPipelines = result.body.data.pipelines.items;
        }
      } catch (e) {
        showResult(id, { status: 0, body: { errors: [{ message: e.message }] } });
      } finally {
        btn.disabled = false;
      }
    }

    async function runPipelineById() {
      if (!lastPipelines.length) {
        showResult("pipeline", { status: 0, body: { errors: [{ message: "Run 'pipelines' first" }] } });
        return;
      }
      const id = lastPipelines[0].id;
      await runQuery("pipeline", `{ pipeline(id: "${id}") { id name code currentVersion { id } } }`);
    }

    async function runPipeline() {
      const pipelineId = document.getElementById("run-pipeline-id").value.trim();
      const versionId = document.getElementById("run-version-id").value.trim();
      if (!pipelineId || !versionId) {
        showResult("runPipeline", { status: 0, body: { errors: [{ message: "Enter pipeline ID and version ID" }] } });
        return;
      }
      const query = `mutation {
        runPipeline(input: { id: "${pipelineId}", versionId: "${versionId}", config: {} }) {
          success
          errors
          run { id status }
        }
      }`;
      const result = await gql(query);
      showResult("runPipeline", result);
    }

    async function listFiles() {
      const slug = document.getElementById("workspace-slug").value.trim();
      if (!slug) {
        showResult("files", { status: 0, body: { errors: [{ message: "Enter a workspace slug" }] } });
        return;
      }
      const query = `{ getFileByPath(workspaceSlug: "${slug}", path: "") { name path type } }`;
      const result = await gql(query);
      showResult("files", result);
    }

    async function runCustom() {
      const query = document.getElementById("custom-query").value.trim();
      if (!query) return;
      const result = await gql(query);
      showResult("custom", result);
    }
  </script>
</body>
</html>
