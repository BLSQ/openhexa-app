query AssistantConversationMessages($id: UUID!, $page: Int = 1, $perPage: Int = 20) {
  assistantConversation(id: $id) {
    id
    name
    messages(page: $page, perPage: $perPage) {
      items {
        id
        role
        content {
          ... on AssistantTextSegment {
            content
          }
          ... on AssistantToolSegment {
            id
            toolCallId
            toolName
            tool
            toolInput
            toolOutput
            success
            proposalPending
          }
        }
        createdAt
      }
      totalItems
      totalPages
    }
  }
}
