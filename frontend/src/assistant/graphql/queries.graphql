query AssistantPage($workspaceSlug: String!) {
  workspace(slug: $workspaceSlug) {
    ...WorkspaceLayout_workspace
    assistantConversations {
      id
      name
      updatedAt
    }
  }
  me {
    assistantMonthlyLimitExceeded
  }
}

query AssistantConversationMessages($id: UUID!, $page: Int = 1, $perPage: Int = 20) {
  assistantConversation(id: $id) {
    id
    name
    messages(page: $page, perPage: $perPage) {
      items {
        id
        role
        content {
          ... on AssistantTextSegment {
            content
          }
          ... on AssistantToolSegment {
            id
            toolCallId
            toolName
            toolInput
            toolOutput
            success
            proposalPending
          }
        }
        createdAt
      }
      totalItems
      totalPages
    }
  }
}
